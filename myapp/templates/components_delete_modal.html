<!-- Confirm Delete Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-danger">
        <h5 class="modal-title" id="confirmDeleteLabel">⚠️ ยืนยันการลบ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="deleteMessage" class="text-muted mb-0">
          คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลนี้? การลบข้อมูลจะไม่สามารถคืนได้
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          ยกเลิก
        </button>
        <form id="deleteForm" method="post" style="display: inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            🗑️ ลบถาวร
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
// Function to open delete confirmation modal
function confirmDelete(url, message = null) {
  const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
  const form = document.getElementById('deleteForm');
  const deleteMsg = document.getElementById('deleteMessage');
  
  // Set custom message if provided
  if (message) {
    deleteMsg.textContent = message;
  } else {
    deleteMsg.textContent = 'คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลนี้? การลบข้อมูลจะไม่สามารถคืนได้';
  }
  
  // Set form action to delete URL
  form.action = url;
  
  // Show modal
  modal.show();
  
  // Prevent default action from onclick
  return false;
}
</script>
