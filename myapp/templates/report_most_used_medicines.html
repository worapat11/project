{% extends 'base.html' %}

{% block content %}
<h2 class="page-title">ยาที่ใช้บ่อย</h2>
<table class="table table-bordered">
<thead><tr><th>ยา</th><th>จำนวนครั้ง</th></tr></thead>
<tbody>
{% for m in most_used %}
<tr>
<td>{{ m.medicine__medicine_name }}</td>
<td>{{ m.total_qty }}</td>
</tr>
{% empty %}
<tr><td colspan="2">ไม่มีข้อมูลการใช้ยา</td></tr>
{% endfor %}
</tbody>
<tfoot>
<tr>
<th>รวมทั้งหมด</th>
<th>{{ total_qty }}</th>
</tr>
</tfoot>
</table>
{% endblock %}
