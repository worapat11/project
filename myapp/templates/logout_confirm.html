{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">

คุณแน่ใจหรือว่าต้องการออกจากระบบ?
</p>

<div class="d-grid gap-2">

<a href="{% url 'dashboard' %}" class="btn btn-secondary">

</div>

</div>
</div>
</div>
