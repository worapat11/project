{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2>แก้ไขยา</h2>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>รหัสยา</label>
<input type="text" name="medicine_id" class="form-control" value="{{ medicine.medicine_id }}" readonly>
</div>

<div class="mb-3">
<label>ชื่อยา</label>
<input type="text" name="medicine_name" class="form-control"
value="{{ medicine.medicine_name }}">
</div>

<div class="mb-3"><label>ผู้จัดหา</label>
<input type="text" class="form-control" value="{{ medicine.supplier.supplier_name }}" readonly>
<input type="hidden" name="supplier" value="{{ medicine.supplier.supplier_id }}">
</div>

<div class="mb-3"><label>ประเภท</label>
<select name="medicine_type" class="form-control">
    <option value="">-- เลือกประเภท --</option>
    <option value="ยา" {% if medicine.type == "ยา" %}selected{% endif %}>ยา (Medicines)</option>
    <option value="วัคซีน" {% if medicine.type == "วัคซีน" %}selected{% endif %}>วัคซีน (Vaccines)</option>
    <option value="อาหารสัตว์" {% if medicine.type == "อาหารสัตว์" %}selected{% endif %}>อาหารสัตว์ (Pet Food)</option>
    <option value="อาหารเสริม" {% if medicine.type == "อาหารเสริม" %}selected{% endif %}>อาหารเสริม (Supplements)</option>
    <option value="ผลิตภัณฑ์ดูแลสัตว์" {% if medicine.type == "ผลิตภัณฑ์ดูแลสัตว์" %}selected{% endif %}>ผลิตภัณฑ์ดูแลสัตว์ (Pet Care)</option>
    <option value="อุปกรณ์สัตว์เลี้ยง" {% if medicine.type == "อุปกรณ์สัตว์เลี้ยง" %}selected{% endif %}>อุปกรณ์สัตว์เลี้ยง (Accessories)</option>
</select>
</div>

<div class="mb-3">
<label>ราคา</label>
<input type="number" step="0.01" name="price" class="form-control"
value="{{ medicine.price }}">
</div>

<div class="mb-3">
<label>คงคลัง</label>
<input type="number" name="stock" class="form-control" min="0" value="{% if stock %}{{ stock.quantity }}{% else %}0{% endif %}">
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<button class="btn btn-success">บันทึก</button>
<a href="/medicines/" class="btn btn-secondary">ยกเลิก</a>

</form>

</div>

{% endblock %}
