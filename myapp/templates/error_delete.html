{% extends 'base.html' %}

{% block content %}
<style>
.error-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
}

.error-card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  padding: 40px;
  max-width: 500px;
  width: 100%;
  text-align: center;
}

.error-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

.error-title {
  color: #d32f2f;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 15px;
}

.error-message {
  color: #666;
  font-size: 1.1rem;
  line-height: 1.6;
  margin-bottom: 30px;
}

.error-reason {
  background: #ffebee;
  border: 1px solid #ef5350;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 30px;
  color: #b71c1c;
  font-weight: 600;
  text-align: left;
}

.error-reason strong {
  display: block;
  margin-bottom: 8px;
  color: #d32f2f;
}

.error-reason ul {
  list-style-position: inside;
  padding: 0;
  margin: 0;
}

.error-reason li {
  margin-bottom: 8px;
  font-size: 0.95rem;
}

.error-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.btn-back {
  background: #667eea;
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.btn-back:hover {
  background: #5568d3;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  color: white;
}

.btn-home {
  background: #f5f5f5;
  color: #333;
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.btn-home:hover {
  background: #e0e0e0;
  transform: translateY(-2px);
  color: #333;
}

.error-details {
  text-align: left;
  margin-top: 25px;
  padding-top: 20px;
  border-top: 1px solid #eee;
  font-size: 0.9rem;
  color: #999;
}

.error-details strong {
  color: #666;
}
</style>

<div class="error-container">
  <div class="error-card">
    <div class="error-icon">❌</div>
    <h1 class="error-title">ไม่สามารถลบได้</h1>
    
    <p class="error-message">
      ขออภัย ไม่สามารถลบข้อมูลนี้ได้เนื่องจากมีข้อมูลที่เกี่ยวข้องในระบบ
    </p>

    <div class="error-reason">
      <strong>🔍 เหตุผล:</strong>
      {{ reason|default:"มีข้อมูลที่เกี่ยวข้อง" }}
    </div>

    {% if details %}
    <div class="error-details">
      <strong>รายละเอียด:</strong><br>
      {{ details }}
    </div>
    {% endif %}

    <div class="error-actions">
      <button class="btn-back" onclick="window.history.back()">
        🔙 กลับไปหน้าก่อนหน้า
      </button>
      <a href="{% url 'dashboard' %}" class="btn-home">
        🏠 กลับแดชบอร์ด
      </a>
    </div>
  </div>
</div>

{% endblock %}
