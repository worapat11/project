{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
<h2>แก้ไขบิล</h2>
<form method="post">
{% csrf_token %}

<div class="mb-3">
<label>รหัสบิล</label>
<input type="text" class="form-control" value="{{ bill.bill_id }}" readonly>
</div>

<div class="mb-3">
<label>วันที่บิล</label>
<input type="date" name="bill_date" class="form-control" value="{{ bill.bill_date|date:'Y-m-d' }}">
</div>

<div class="mb-3">
<label>จำนวนเงินรวม</label>
<input type="number" step="0.01" name="total_amount" class="form-control" value="{{ bill.total_amount }}">
</div>

<button class="btn btn-success">บันทึก</button>
<a href="{% url 'bill_detail' bill.bill_id %}" class="btn btn-secondary">กลับไปดูบิล</a>
</form>
</div>
{% endblock %}
